# Sets the application name
spring.application.name=coinbank2

# Maps to LOCAL_DB_URL from your .env file
spring.datasource.url=${LOCAL_DB_URL}

# Maps to LOCAL_DB_USERNAME from your .env file
spring.datasource.username=${LOCAL_DB_USERNAME}

# Maps to LOCAL_DB_PASSWORD from your .env file
spring.datasource.password=${LOCAL_DB_PASSWORD}

# Maps the server port to the PORT variable in your .env file
server.port=${PORT}

# Official driver for MySQL connection
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate setting to update the schema automatically
spring.jpa.hibernate.ddl-auto=update

# Enables SQL logging in the console
spring.jpa.show-sql=true

# Specifies the MySQL dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


